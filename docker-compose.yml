services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: zuripay
      POSTGRES_USER: zuripay
      POSTGRES_PASSWORD: zuripay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zuripay"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── Backend API ─────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      # Override .env values so Docker service hostnames are used
      DATABASE_URL: postgresql+psycopg2://zuripay:zuripay@postgres:5432/zuripay
      REDIS_URL: redis://redis:6379/0
    volumes:
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Celery Worker ───────────────────────────────────────────────────────────

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app worker --loglevel=info
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://zuripay:zuripay@postgres:5432/zuripay
      REDIS_URL: redis://redis:6379/0
    volumes:
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Admin Dashboard ─────────────────────────────────────────────────────────

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  storage_data:
